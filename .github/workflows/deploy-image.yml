name: Deploy FastAPI

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            cd app
            git pull
            docker stop oracle-fastapi || true
            docker rm oracle-fastapi || true
            docker build -t oracle-fastapi-app .
            docker run -d -p 8000:8000 --name oracle-fastapi oracle-fastapi-app
